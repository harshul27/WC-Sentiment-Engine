name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-security:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install pinned dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: python -m ruff check src tests

      - name: Bandit static security scan
        run: python -m bandit -r src -q

      - name: Audit pinned dependencies for known CVEs
        run: python -m pip_audit -r requirements.txt --no-deps --disable-pip

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install pinned dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest suite
        run: python -m pytest tests -q

      - name: Pipeline smoke run (ingest + self-correction)
        run: python src/pipeline.py all
